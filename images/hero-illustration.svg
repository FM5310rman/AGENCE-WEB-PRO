<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a11cb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2575fc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="500" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- Laptop illustration -->
  <g transform="translate(100, 150)">
    <!-- Laptop base -->
    <rect x="20" y="120" width="260" height="20" fill="#333" rx="3"/>
    
    <!-- Laptop screen -->
    <rect x="30" y="20" width="240" height="140" fill="#fff" stroke="#333" stroke-width="3" rx="5"/>
    
    <!-- Screen content - simplified -->
    <rect x="40" y="30" width="220" height="30" fill="#6a11cb" rx="3"/>
    <rect x="40" y="70" width="220" height="15" fill="#e0e0e0" rx="2"/>
    <rect x="40" y="90" width="220" height="15" fill="#e0e0e0" rx="2"/>
    <rect x="40" y="110" width="100" height="15" fill="#e0e0e0" rx="2"/>
    
    <!-- Keyboard -->
    <g transform="translate(30, 165)">
      <rect x="0" y="0" width="240" height="8" fill="#555" rx="2"/>
      <rect x="5" y="3" width="230" height="2" fill="#666"/>
    </g>
  </g>
  
  <!-- Code brackets -->
  <g transform="translate(50, 80)">
    <text x="0" y="0" font-size="40" fill="#fff" opacity="0.3" font-family="monospace">&lt;</text>
    <text x="200" y="0" font-size="40" fill="#fff" opacity="0.3" font-family="monospace">&gt;</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="80" cy="80" r="30" fill="#fff" opacity="0.1"/>
  <circle cx="420" cy="420" r="50" fill="#fff" opacity="0.1"/>
  
  <!-- Text -->
  <text x="250" y="450" font-size="20" fill="#fff" text-anchor="middle" font-weight="bold">Développement Web</text>
</svg>
